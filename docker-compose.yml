services:
    app:
        build:
            context: .
            dockerfile: docker/Dockerfile
        container_name: laundrix-app
        restart: unless-stopped
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html
            - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-laundrix.ini:ro
        environment:
            DB_HOST: mysql
            REDIS_HOST: redis
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_started
        networks: [laundrix]

    nginx:
        image: nginx:1.27-alpine
        container_name: laundrix-nginx
        restart: unless-stopped
        ports:
            - "${APP_PORT:-80}:80"
        volumes:
            - ./:/var/www/html:ro
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on: [app]
        networks: [laundrix]

    mysql:
        image: mysql:8.4
        container_name: laundrix-mysql
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DB_DATABASE:-laundrix}
            MYSQL_USER: ${DB_USERNAME:-laundrix}
            MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
        volumes:
            - mysql-data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
            interval: 5s
            retries: 10
        networks: [laundrix]

    redis:
        image: redis:7-alpine
        container_name: laundrix-redis
        restart: unless-stopped
        command: redis-server --appendonly yes
        volumes:
            - redis-data:/data
        networks: [laundrix]

    queue:
        build:
            context: .
            dockerfile: docker/Dockerfile
        container_name: laundrix-queue
        restart: unless-stopped
        working_dir: /var/www/html
        command: php artisan queue:work redis --sleep=1 --tries=3 --max-time=3600
        volumes:
            - ./:/var/www/html
        depends_on: [app]
        networks: [laundrix]

    scheduler:
        build:
            context: .
            dockerfile: docker/Dockerfile
        container_name: laundrix-scheduler
        restart: unless-stopped
        working_dir: /var/www/html
        command: php artisan schedule:work
        volumes:
            - ./:/var/www/html
        depends_on: [app]
        networks: [laundrix]

networks:
    laundrix:
        driver: bridge

volumes:
    mysql-data:
    redis-data:
